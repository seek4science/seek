default: &default
  backend: local

development:
#  <<: *default
  backend: s3
  bucket: seek-dev
  region: us-east-1
  access_key_id: seek
  secret_access_key: seek1234
  endpoint: http://localhost:9000
  force_path_style: true

test:
  <<: *default

production:
  # Driven by SEEK_STORAGE_* environment variables so the same image can run
  # against local disk or an S3-compatible store (AWS S3, MinIO, SeaweedFS)
  # without a rebuild. See docker/s3.env for the docker-compose-s3.yml values.
  backend: <%= ENV.fetch('SEEK_STORAGE_BACKEND', 'local') %>
  bucket: <%= ENV['SEEK_STORAGE_BUCKET'] %>
  region: <%= ENV.fetch('SEEK_STORAGE_REGION', 'us-east-1') %>
  access_key_id: <%= ENV['SEEK_STORAGE_ACCESS_KEY_ID'] %>
  secret_access_key: <%= ENV['SEEK_STORAGE_SECRET_ACCESS_KEY'] %>
  endpoint: <%= ENV['SEEK_STORAGE_ENDPOINT'] %>
  # Only needed when endpoint isn't reachable from the browser (e.g. an internal
  # docker-network hostname) — used solely for signing presigned download URLs.
  public_endpoint: <%= ENV['SEEK_STORAGE_PUBLIC_ENDPOINT'] %>
  force_path_style: <%= ENV['SEEK_STORAGE_FORCE_PATH_STYLE'] == 'true' %>


