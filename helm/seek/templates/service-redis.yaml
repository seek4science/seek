apiVersion: v1
kind: Service
metadata:
  name: {{ include "seek.fullname" . }}-redis
  labels:
    {{- include "seek.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    {{- include "seek.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
