- hosts: [servers]
  become: true
  become_user: '{{user_var}}'
  vars_files:
    - group_vars/vars.yml
    - group_vars/sensitive_vars.yml

  tasks:

    ########## Initial check for the OS

    - name: Ensure this play runs only on Ubuntu 22.04/24.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_release in ["jammy", "noble"]
        fail_msg: "This Ansible playbook is intended for Ubuntu 22.04 (jammy) or 24.04 (noble)."

    ########## Update and install dependencies

    - name: Install prerequisites for Redis APT repository
      become: true
      become_user: root
      ansible.builtin.apt:
        name:
          - lsb-release
          - curl
          - gpg
        state: present
        update_cache: yes
      tags: [ packages ]

    - name: Download Redis APT repo GPG key (armored)
      become: true
      become_user: root
      ansible.builtin.get_url:
        url: https://packages.redis.io/gpg
        dest: /usr/share/keyrings/redis-archive-keyring.gpg.asc
        mode: "0644"
      register: redis_key_download
      tags: redis

    - name: Dearmor Redis key into keyring
      become: true
      become_user: root
      ansible.builtin.command:
        cmd: gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg /usr/share/keyrings/redis-archive-keyring.gpg.asc
      when: redis_key_download.changed
      tags: redis

    - name: Add official Redis APT repository
      become: true
      become_user: root
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb {{ ansible_distribution_release }} main"
        filename: redis
        state: present
      tags: redis
      # This follows Redis' documented APT repo setup. [1](https://redis.io/docs/latest/operate/oss_and_stack/install/install-stack/apt/)

    - name: Pin Redis packages to 8.6.x
      become: true
      become_user: root
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/redis-8.6
        mode: "0644"
        content: |
          Package: redis redis-server redis-sentinel redis-tools
          Pin: version 6:8.6.*
          Pin-Priority: 1001
      tags: redis
      # Pinning to a version line via APT preferences is the approach Redis documents. [1](https://redis.io/docs/latest/operate/oss_and_stack/install/install-stack/apt/)

    - name: Update all packages to their latest version
      become: true
      become_user: root
      ansible.builtin.apt:
        update_cache: yes
        name: "*"
        state: latest
      tags: packages

    - name: Install list of dependencies
      become: true
      become_user: root
      ansible.builtin.apt:
        state: present
        update_cache: yes
        pkg:
        - autoconf
        - automake
        - bison
        - build-essential
        - cmake
        - gawk
        - git
        - graphviz
        - imagemagick
        - libcurl4-gnutls-dev
        - libffi-dev
        - libgdbm-dev
        - libgmp-dev
        - libmagick++-dev
        - libmysqlclient-dev
        - libncurses5-dev
        - libpq-dev
        - libreadline-dev
        - libreoffice
        - libsqlite3-dev
        - libssl-dev
        - libxml++2.6-dev
        - libxslt1-dev
        - libyaml-dev
        - mysql-server
        - nodejs
        - openjdk-11-jdk
        - openssh-server
        - poppler-utils
        - redis-tools
        - sqlite3
        - zip
      tags: packages

    - name: Wait for Redis in service container to respond to PING (localhost:6379)
      become: true
      become_user: root
      ansible.builtin.command: redis-cli -h 127.0.0.1 -p 6379 ping
      register: redis_ping
      changed_when: false
      retries: 20
      delay: 3
      until: redis_ping.stdout is search("PONG")
      tags: redis

    - name: Correct java version selected
      become: true
      become_user: root
      community.general.alternatives:
        name: java
        path: /usr/lib/jvm/java-11-openjdk-amd64/bin/java
      tags: packages


    ########## Install rvm

    - name: Add repository to install rvm
      become: true
      become_user: root
      ansible.builtin.apt_repository:
        repo: ppa:rael-gc/rvm
      tags: rvm

    - name: Install rvm
      become: true
      become_user: root
      ansible.builtin.apt:
        pkg:
        - software-properties-common
        - rvm
      tags: rvm

    - name: Activate user rvm
      become: true
      become_user: root
      shell: >
        usermod -a -G rvm '{{user_var}}'
      tags: rvm

    - name: Reset connection  #To allow user changes to take affect with new login shell
      meta: reset_connection
      tags: ruby

    ########## Clone SEEK

    - name: SEEK branch to be pulled
      ansible.builtin.debug:
        var: git_version
      tags:
        - seek
        - git

    - name: Clone SEEK git repo
      ansible.builtin.git:
        repo: 'https://github.com/seek4science/seek.git'
        dest: '{{git_dest}}/SEEK'
        version: '{{git_version}}'
        force: yes
      tags:
        - seek
        - git

    - name: Configure git
      shell: >
        git config --global --add safe.directory '{{git_dest}}/SEEK'
      run_once: true
      tags: git


    ########## Install ruby

    - name:  Install Ruby
      shell: bash -lc "{{ item }}"
      with_items:
        - rvm install $(cat '{{git_dest}}/SEEK/.ruby-version')
      tags: ruby

    - name: Set default Ruby
      shell: bash -lc "{{ item }}"
      with_items:
        - rvm alias create default $(cat '{{git_dest}}/SEEK/.ruby-version')
        - rvm --default use $(cat '{{git_dest}}/SEEK/.ruby-version')
      tags: ruby

    - name: Generate docs
      shell: bash -lc "{{ item }}"
      with_items:
        - rvm all do rvm docs generate
      ignore_errors: yes                  #Generating docs fails often, and it is not actually necessary...
      tags: ruby

    - name: Install bundler
      shell: bash -lc "{{ item }}"
      with_items:
        - gem install bundler
      tags: ruby


    ########## Install SEEK Gems

    - name: Install SEEK Gems
      shell: bash -lc "{{ item }}"
      with_items:
        - bundle install
      args:
        chdir: '{{git_dest}}/SEEK'
      tags:
        - seek
        - ruby


    ########## Install python tools

    - name: Read python version from .python-version file
      ansible.builtin.slurp:
        src: '{{git_dest}}/SEEK/.python-version'
      register: python_version_file
      tags: python

    - name: Set python version fact
      ansible.builtin.set_fact:
        python_version: "{{ python_version_file.content | b64decode | trim }}"
      tags: python

    - name: Add repository to install python
      become: true
      become_user: root
      ansible.builtin.apt_repository:
        repo: ppa:deadsnakes/ppa
      tags: python

    - name: Reset connection 2  #To allow user changes to affect 'current login user'
      meta: reset_connection
      tags: python

    - name: Install python tools
      become: true
      become_user: root
      ansible.builtin.apt:
        pkg:
        - python{{ python_version }}-dev
        - python3-pip
        - python{{ python_version }}-venv
        - python3-pymysql
      tags:
        - python
        - packages

    - name: Install SEEK's python requirements
      shell: bash -lc "{{ item }}"
      with_items:
        - python{{ python_version }} -m ensurepip --upgrade --default-pip
        - python{{ python_version }} -m pip install -r requirements.txt
      args:
        chdir: '{{git_dest}}/SEEK'
      tags:
        - seek
        - python


    ########## Configure database

    - name: Copy default database config
      ansible.builtin.copy:
        src: '{{git_dest}}/SEEK/config/database.default.yml'
        dest: '{{git_dest}}/SEEK/config/database.yml'
        remote_src: yes
      tags: database

    - name: Configure database user
      ansible.builtin.replace:
        path: '{{git_dest}}/SEEK/config/database.yml'
        regexp: 'mysqluser'
        replace: '{{sql_user}}'
      tags: database

    - name: Configure database password
      ansible.builtin.replace:
        path: '{{git_dest}}/SEEK/config/database.yml'
        regexp: 'mysqlpassword'
        replace: '{{sql_password}}'
      tags: database

    - name: Create database user
      become: true
      become_user: root
      mysql_user:
        name: '{{sql_user}}'
        password: '{{sql_password}}'
        priv: '*.*:ALL,GRANT'
        state: present
        login_unix_socket: /run/mysqld/mysqld.sock
      tags: database


    ########## Setup and launch

    - name:  Rake db:setup
      shell: bash -lc "{{ item }}"
      with_items:
        - bundle exec rake db:setup
      args:
        chdir: '{{git_dest}}/SEEK'
      tags: database

    # - name: Rails server
    #   shell: >
    #     bundle exec rails server
    #   args:
    #     chdir: '{{git_dest}}/SEEK'
